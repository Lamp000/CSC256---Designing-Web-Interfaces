<!-- this tells the browser that this is an HTML5 webpage so the browser knows what it will need to support on the page -->
<!DOCTYPE html>
<!-- opening html tag should follow the doctype tag; language = English -->
<html lang="en">
    <!-- head section should be the first of 2 sections after the html tag; the code here is primarily for the browser and search engines -->
<head>
    <!-- this page may contain any character from any language -->
    <meta charset="UTF-8">
    <!-- this is the first step in getting our pages to look good on a mobile device -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- this is the text that will appear in the browser tab; short/sweet/descriptive -->
    <title>CSC256 Escape Room</title>
    <!-- add the CSS file link(s) here -->
</head>
<!-- anything that the user should see goes in the body section - text, images, videos -->
<body>
    <!-- header is one of our Semantic HTML tags, generally speaking it should be placed near the top of the page, it can have logo, page title, menu - anything that should be at the top of the page -->
    <header>
        <!-- there should be 1 and only 1 h1 (heading level 1) tag on our pages -->
        <h1>Welcome to my Escape Room chooser!</h1>
    </header>

    <main>
        <!-- this section will show the available escape rooms -->
         <section>
            <!-- each one of my escape rooms will show up in a seperate article area -->
            <article>
                <!-- h2 is the second level heading - use as many as you'd like -->
                <h2>Island Escape</h2>

                <img src=""></img>
            </article>
         </section>
    </main>

    <!-- this should be the 2nd to last line of your webpage -->
</body>
<!-- this closing html tag should be the last line on the page -->
</html>
